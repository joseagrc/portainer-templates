services:
  mariadb:
    container_name: ${COMPOSE_PROJECT_NAME}-mariadb
    image: ${MARIADB_IMAGE}:${MARIADB_TAG}
    restart: unless-stopped
    volumes:
      - mariadb:/var/lib/mysql
    environment:
      TIMEZONE: ${TIMEZONE}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  roundcubemail:
    container_name: ${COMPOSE_PROJECT_NAME}-app
    hostname: ${SITE_URL}
    image: ${ROUNDCUBEMAIL_IMAGE}:${ROUNDCUBEMAIL_TAG}
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    links:
      - mariadb:mariadb
    volumes:
      - data:/var/www/html
      - config:/var/roundcube/config
    environment:
      ROUNDCUBEMAIL_DB_TYPE: ${ROUNDCUBEMAIL_DB_TYPE}
      ROUNDCUBEMAIL_DB_HOST: ${COMPOSE_PROJECT_NAME}-mariadb
      ROUNDCUBEMAIL_DB_PORT: ${ROUNDCUBEMAIL_DB_PORT}
      ROUNDCUBEMAIL_DB_USER: ${MARIADB_USER}
      ROUNDCUBEMAIL_DB_PASSWORD: ${MARIADB_PASSWORD}
      ROUNDCUBEMAIL_DB_NAME: ${MARIADB_DATABASE}
      ROUNDCUBEMAIL_DEFAULT_HOST: ${ROUNDCUBEMAIL_DEFAULT_HOST}
      ROUNDCUBEMAIL_DEFAULT_PORT: ${ROUNDCUBEMAIL_DEFAULT_PORT}
      ROUNDCUBEMAIL_SMTP_SERVER: ${ROUNDCUBEMAIL_SMTP_SERVER}
      ROUNDCUBEMAIL_SMTP_PORT: ${ROUNDCUBEMAIL_SMTP_PORT}
      ROUNDCUBEMAIL_USERNAME_DOMAIN: ${ROUNDCUBEMAIL_USERNAME_DOMAIN}
      ROUNDCUBEMAIL_INSTALL_PLUGINS: ${ROUNDCUBEMAIL_INSTALL_PLUGINS}
      ROUNDCUBEMAIL_PLUGINS: ${ROUNDCUBEMAIL_PLUGINS}
      ROUNDCUBEMAIL_SKIN: ${ROUNDCUBEMAIL_SKIN}
      ROUNDCUBEMAIL_UPLOAD_MAX_FILESIZE: ${ROUNDCUBEMAIL_UPLOAD_MAX_FILESIZE}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${NETWORK}"
      
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-app.rule=Host(`${SITE_URL}`) || Host(`www.${SITE_URL}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-app.entrypoints=web"
      
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-app.middlewares=redirect-to-https@docker"
      
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-app-https.rule=Host(`${SITE_URL}`) || Host(`www.${SITE_URL}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-app-https.entrypoints=websecure"
      
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-app-https.tls=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-app-https.tls.certresolver=letsencrypt"

      - "traefik.http.services.${COMPOSE_PROJECT_NAME}-app.loadbalancer.server.port=80"       

volumes:
  mariadb:
  data:
  config:

networks:
  default:
    name: ${NETWORK}
    external: true
