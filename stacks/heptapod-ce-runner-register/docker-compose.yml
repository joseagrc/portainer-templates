services:
  gitlab-runner-register:
    container_name: ${COMPOSE_PROJECT_NAME}-register
    image: ${HEPTAPOD_CE_RUNNER_IMAGE}:${HEPTAPOD_CE_RUNNER_TAG}
    restart: no
    command:
      - register
      - --non-interactive
      - --url=${HEPTAPOD_URL}
      - --token=${RUNNER_TOKEN}
      - --executor=${EXECUTOR}
      - --docker-image=${DOCKER_IMAGE}
      - --description=${DESCRIPTION}
    volumes:
      - config:/etc/gitlab-runner/

volumes:
  config:

networks:
  default:
    name: ${NETWORK}
    external: true