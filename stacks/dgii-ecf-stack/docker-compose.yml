services:
  postgres:
    image: ${POSTGRES_IMAGE}:${POSTGRES_TAG}
    command:
      - "postgres"
      - "-c"
      - "max_connections=${POSTGRES_MAX_CONNECTIONS:-200}"
      - "-c"
      - "shared_buffers=${POSTGRES_SHARED_BUFFERS:-6GB}"
      - "-c"
      - "effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-24GB}"
      - "-c"
      - "maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-1GB}"
      - "-c"
      - "work_mem=${POSTGRES_WORK_MEM:-32MB}"
      - "-c"
      - "checkpoint_completion_target=${POSTGRES_CHECKPOINT_COMPLETION_TARGET:-0.9}"
      - "-c"
      - "wal_compression=${POSTGRES_WAL_COMPRESSION:-on}"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB requerido}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER requerido}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requerido}
    volumes:
      - dgii_ecf_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-dgii_ecf_engine}"
        ]
      interval: ${POSTGRES_HEALTH_INTERVAL:-10s}
      timeout: ${POSTGRES_HEALTH_TIMEOUT:-5s}
      retries: ${POSTGRES_HEALTH_RETRIES:-10}
      start_period: ${POSTGRES_HEALTH_START_PERIOD:-30s}
    deploy:
      replicas: 1
      update_config:
        order: stop-first
        failure_action: rollback
      rollback_config:
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 10
        window: 120s

  pgadmin:
    image: ${PGADMIN_IMAGE}:${PGADMIN_TAG}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:?PGADMIN_DEFAULT_EMAIL requerido}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?PGADMIN_DEFAULT_PASSWORD requerido}
    deploy:
      replicas: 1
      update_config:
        order: start-first
        failure_action: rollback
      rollback_config:
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s
      labels:
        - traefik.enable=true
        - traefik.docker.network=${NETWORK:-proxy}
        - traefik.http.routers.pgadmin.rule=Host(`${PGADMIN_DOMAIN}`)
        - traefik.http.routers.pgadmin.entrypoints=websecure
        - traefik.http.routers.pgadmin.tls=true
        - traefik.http.routers.pgadmin.tls.certresolver=letsencrypt
        - traefik.http.services.pgadmin.loadbalancer.server.port=80

  redis:
    image: ${REDIS_IMAGE}:${REDIS_TAG}
    command:
      [
        "redis-server",
        "--appendonly",
        "${REDIS_APPENDONLY:-yes}",
        "--requirepass",
        "${REDIS_PASSWORD:?REDIS_PASSWORD requerido}",
        "--protected-mode",
        "yes"
      ]
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--pass",
          "${REDIS_PASSWORD:?REDIS_PASSWORD requerido}",
          "ping"
        ]
      interval: ${REDIS_HEALTH_INTERVAL:-10s}
      timeout: ${REDIS_HEALTH_TIMEOUT:-5s}
      retries: ${REDIS_HEALTH_RETRIES:-10}
      start_period: ${REDIS_HEALTH_START_PERIOD:-20s}
    deploy:
      replicas: 1
      update_config:
        order: stop-first
        failure_action: rollback
      rollback_config:
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 10
        window: 120s

  redisinsight:
    image: ${REDISINSIGHT_IMAGE}:${REDISINSIGHT_TAG}
    volumes:
      - redisinsight_data:/data
    environment:
      RI_REDIS_USERNAME: ${RI_REDIS_USERNAME:-}
      RI_REDIS_PASSWORD: ${RI_REDIS_PASSWORD:-}
    deploy:
      replicas: 1
      update_config:
        order: start-first
        failure_action: rollback
      rollback_config:
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s
      labels:
        - traefik.enable=true
        - traefik.docker.network=${NETWORK:-proxy}
        - traefik.http.routers.redisinsight.rule=Host(`${REDISINSIGHT_DOMAIN}`)
        - traefik.http.routers.redisinsight.entrypoints=websecure
        - traefik.http.routers.redisinsight.tls=true
        - traefik.http.routers.redisinsight.tls.certresolver=letsencrypt
        - traefik.http.services.redisinsight.loadbalancer.server.port=5540

  dgii-ecf-engine:
    image: ${DGII_ECF_ENGINE_IMAGE}:${DGII_ECF_ENGINE_TAG}
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: "4000"
      TRUST_PROXY: ${TRUST_PROXY:-1}
      CORS_ALLOWED_ORIGINS: https://${PORTAL_DOMAIN}

      PLATFORM_ADMIN_BOOTSTRAP_ENABLED: ${PLATFORM_ADMIN_BOOTSTRAP_ENABLED:-false}
      PLATFORM_ADMIN_EMAIL: ${PLATFORM_ADMIN_EMAIL:-}
      PLATFORM_ADMIN_FULL_NAME: ${PLATFORM_ADMIN_FULL_NAME:-Administrador de Plataforma}
      PLATFORM_ADMIN_PASSWORD: ${PLATFORM_ADMIN_PASSWORD:-}
      PLATFORM_ADMIN_RESET_PASSWORD_ON_BOOT: ${PLATFORM_ADMIN_RESET_PASSWORD_ON_BOOT:-false}

      API_REQUEST_BODY_LIMIT: ${API_REQUEST_BODY_LIMIT:-2mb}
      HTTP_REQUEST_TIMEOUT_MS: ${HTTP_REQUEST_TIMEOUT_MS:-30000}
      HTTP_HEADERS_TIMEOUT_EXTRA_MS: ${HTTP_HEADERS_TIMEOUT_EXTRA_MS:-5000}
      HTTP_KEEP_ALIVE_TIMEOUT_MS: ${HTTP_KEEP_ALIVE_TIMEOUT_MS:-5000}

      DGII_HTTP_TIMEOUT_MS: ${DGII_HTTP_TIMEOUT_MS:-45000}
      BUYER_DELIVERY_TIMEOUT_MS: ${BUYER_DELIVERY_TIMEOUT_MS:-15000}
      XML_VALIDATION_TIMEOUT_MS: ${XML_VALIDATION_TIMEOUT_MS:-10000}
      WORKER_JOB_TIMEOUT_MS: ${WORKER_JOB_TIMEOUT_MS:-120000}

      DATABASE_ENABLED: ${DATABASE_ENABLED:-true}
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER requerido}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requerido}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB requerido}?schema=public
      DATABASE_LOG_QUERIES: ${DATABASE_LOG_QUERIES:-false}
      RUN_PRISMA_MIGRATE_ON_BOOT: "false"

      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:?REDIS_PASSWORD requerido}@redis:6379}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-dgii-ecf-engine-prod}
      REDIS_CONNECT_TIMEOUT_MS: ${REDIS_CONNECT_TIMEOUT_MS:-5000}
      REDIS_COMMAND_TIMEOUT_MS: ${REDIS_COMMAND_TIMEOUT_MS:-3000}
      RATE_LIMIT_REDIS_FAIL_OPEN: ${RATE_LIMIT_REDIS_FAIL_OPEN:-true}

      APP_DATA_DIR: ${APP_DATA_DIR:-/data}
      APP_LOG_DIR: ${APP_LOG_DIR:-/logs}
      TRANSACTIONS_DIR: ${TRANSACTIONS_DIR:-/data/transactions}
      CERT_STORE_DIR: ${CERT_STORE_DIR:-/data/certificates}
      REGISTRY_FILE: ${REGISTRY_FILE:-/data/registry.json}
      API_KEYS_FILE: ${API_KEYS_FILE:-/data/api_keys.json}
      USERS_FILE: ${USERS_FILE:-/data/users.json}
      AUDIT_LOG_FILE: ${AUDIT_LOG_FILE:-/logs/audit.log}

      CERT_MASTER_KEY_BASE64: ${CERT_MASTER_KEY_BASE64:?CERT_MASTER_KEY_BASE64 requerido}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?INTERNAL_API_TOKEN requerido}
      API_KEY_PEPPER: ${API_KEY_PEPPER:?API_KEY_PEPPER requerido}
      APP_JWT_SECRET: ${APP_JWT_SECRET:?APP_JWT_SECRET requerido}
      APP_JWT_EXPIRES_IN: ${APP_JWT_EXPIRES_IN:-7d}
      DGII_STATUS_API_KEY: ${DGII_STATUS_API_KEY:-}

      XML_XSD_VALIDATION_ENABLED: ${XML_XSD_VALIDATION_ENABLED:-true}
      XML_VALIDATOR_PYTHON: ${XML_VALIDATOR_PYTHON:-python3}

      SAVE_TRANSACTIONS: ${SAVE_TRANSACTIONS:-true}
      SAVE_TRANSACTIONS_INCLUDE_JSON: ${SAVE_TRANSACTIONS_INCLUDE_JSON:-true}
      SAVE_TRANSACTIONS_INCLUDE_RESPONSE: ${SAVE_TRANSACTIONS_INCLUDE_RESPONSE:-true}

      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_DEFAULT_MAX: ${RATE_LIMIT_DEFAULT_MAX:-60}
      RATE_LIMIT_BYPASS_INTERNAL: ${RATE_LIMIT_BYPASS_INTERNAL:-true}
      RATE_LIMIT_RULES: ${RATE_LIMIT_RULES:-}

      FE_RECEPTION_DEFAULT_ENV: ${FE_RECEPTION_DEFAULT_ENV:-TesteCF}

      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_PRETTY: ${LOG_PRETTY:-false}

      QUEUE_SCHEDULER_ENABLED: "false"
      QUEUE_SCHEDULER_RECOVERY_INTERVAL_MS: ${QUEUE_SCHEDULER_RECOVERY_INTERVAL_MS:-60000}
      QUEUE_SCHEDULER_CLEANUP_INTERVAL_MS: ${QUEUE_SCHEDULER_CLEANUP_INTERVAL_MS:-300000}
      QUEUE_SCHEDULER_MAX_RUNNING_MINUTES: ${QUEUE_SCHEDULER_MAX_RUNNING_MINUTES:-10}
      QUEUE_SCHEDULER_MAX_AGE_DAYS_DONE: ${QUEUE_SCHEDULER_MAX_AGE_DAYS_DONE:-7}
      QUEUE_SCHEDULER_MAX_AGE_DAYS_FAILED: ${QUEUE_SCHEDULER_MAX_AGE_DAYS_FAILED:-30}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-1}

      HOUSEKEEPING_ENABLED: "false"
      HOUSEKEEPING_INTERVAL_MS: ${HOUSEKEEPING_INTERVAL_MS:-300000}
      HOUSEKEEPING_QUEUE_DONE_RETENTION_DAYS: ${HOUSEKEEPING_QUEUE_DONE_RETENTION_DAYS:-7}
      HOUSEKEEPING_QUEUE_FAILED_RETENTION_DAYS: ${HOUSEKEEPING_QUEUE_FAILED_RETENTION_DAYS:-30}
      HOUSEKEEPING_QUEUE_ARCHIVE_RETENTION_DAYS: ${HOUSEKEEPING_QUEUE_ARCHIVE_RETENTION_DAYS:-90}
      HOUSEKEEPING_IDEMPOTENCY_PENDING_RETENTION_HOURS: ${HOUSEKEEPING_IDEMPOTENCY_PENDING_RETENTION_HOURS:-24}

      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      HEALTH_DEEP_TOKEN: ${HEALTH_DEEP_TOKEN:-}
      METRICS_AUTH_TOKEN: ${METRICS_AUTH_TOKEN:-}

      SECURITY_STRICT_PRODUCTION: ${SECURITY_STRICT_PRODUCTION:-true}
      SECURITY_REQUIRE_HTTPS: ${SECURITY_REQUIRE_HTTPS:-true}
      SECURITY_TRUSTED_PROXY_HEADER: ${SECURITY_TRUSTED_PROXY_HEADER:-x-forwarded-proto}

      WEBHOOKS_ENABLED: ${WEBHOOKS_ENABLED:-true}
      WEBHOOK_WORKER_INTERVAL_MS: ${WEBHOOK_WORKER_INTERVAL_MS:-3000}
      WEBHOOK_MAX_ATTEMPTS: ${WEBHOOK_MAX_ATTEMPTS:-8}
      WEBHOOK_DEFAULT_TIMEOUT_MS: ${WEBHOOK_DEFAULT_TIMEOUT_MS:-10000}
      WEBHOOK_MAX_RESPONSE_BODY_CHARS: ${WEBHOOK_MAX_RESPONSE_BODY_CHARS:-4000}
      WEBHOOK_ALLOW_PRIVATE_URLS: ${WEBHOOK_ALLOW_PRIVATE_URLS:-true}
      WEBHOOK_REQUIRE_HTTPS: ${WEBHOOK_REQUIRE_HTTPS:-false}
      WEBHOOK_ALLOWED_HOSTS: ${WEBHOOK_ALLOWED_HOSTS:-}
    volumes:
      - dgii_ecf_engine_data:/data
      - dgii_ecf_engine_logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4000/api/v1/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""
        ]
      interval: 20s
      timeout: 10s
      retries: 30
      start_period: 300s
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 60s
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s
      labels:
        - traefik.enable=true
        - traefik.docker.network=${NETWORK:-proxy}
        - traefik.http.routers.dgii-ecf-engine.rule=Host(`${ENGINE_DOMAIN}`)
        - traefik.http.routers.dgii-ecf-engine.entrypoints=websecure
        - traefik.http.routers.dgii-ecf-engine.tls=true
        - traefik.http.routers.dgii-ecf-engine.tls.certresolver=letsencrypt
        - traefik.http.services.dgii-ecf-engine.loadbalancer.server.port=4000
        - traefik.http.middlewares.dgii-ecf-engine-headers.headers.customrequestheaders.X-Forwarded-Proto=https
        - traefik.http.middlewares.dgii-ecf-engine-headers.headers.customresponseheaders.X-Content-Type-Options=nosniff
        - traefik.http.middlewares.dgii-ecf-engine-headers.headers.customresponseheaders.X-Frame-Options=DENY
        - traefik.http.middlewares.dgii-ecf-engine-headers.headers.customresponseheaders.Referrer-Policy=no-referrer
        - traefik.http.routers.dgii-ecf-engine.middlewares=dgii-ecf-engine-headers

  dgii-ecf-scheduler:
    image: ${DGII_ECF_ENGINE_IMAGE}:${DGII_ECF_ENGINE_TAG}
    command:
      [
        "node",
        "dist/workers/runQueueScheduler.js"
      ]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      APP_VERSION: ${APP_VERSION:-1.0.28}
      TRUST_PROXY: ${TRUST_PROXY:-1}

      DATABASE_ENABLED: ${DATABASE_ENABLED:-true}
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER requerido}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requerido}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB requerido}?schema=public
      DATABASE_LOG_QUERIES: ${DATABASE_LOG_QUERIES:-false}
      RUN_PRISMA_MIGRATE_ON_BOOT: "false"

      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:?REDIS_PASSWORD requerido}@redis:6379}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-dgii-ecf-engine-prod}
      REDIS_CONNECT_TIMEOUT_MS: ${REDIS_CONNECT_TIMEOUT_MS:-5000}
      REDIS_COMMAND_TIMEOUT_MS: ${REDIS_COMMAND_TIMEOUT_MS:-3000}

      APP_DATA_DIR: ${APP_DATA_DIR:-/data}
      APP_LOG_DIR: ${APP_LOG_DIR:-/logs}
      TRANSACTIONS_DIR: ${TRANSACTIONS_DIR:-/data/transactions}
      CERT_STORE_DIR: ${CERT_STORE_DIR:-/data/certificates}
      REGISTRY_FILE: ${REGISTRY_FILE:-/data/registry.json}
      API_KEYS_FILE: ${API_KEYS_FILE:-/data/api_keys.json}
      USERS_FILE: ${USERS_FILE:-/data/users.json}
      AUDIT_LOG_FILE: ${AUDIT_LOG_FILE:-/logs/audit.log}

      CERT_MASTER_KEY_BASE64: ${CERT_MASTER_KEY_BASE64:?CERT_MASTER_KEY_BASE64 requerido}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?INTERNAL_API_TOKEN requerido}
      API_KEY_PEPPER: ${API_KEY_PEPPER:?API_KEY_PEPPER requerido}
      APP_JWT_SECRET: ${APP_JWT_SECRET:?APP_JWT_SECRET requerido}

      QUEUE_SCHEDULER_ENABLED: "true"
      QUEUE_SCHEDULER_RECOVERY_INTERVAL_MS: ${QUEUE_SCHEDULER_RECOVERY_INTERVAL_MS:-60000}
      QUEUE_SCHEDULER_CLEANUP_INTERVAL_MS: ${QUEUE_SCHEDULER_CLEANUP_INTERVAL_MS:-300000}
      QUEUE_SCHEDULER_MAX_RUNNING_MINUTES: ${QUEUE_SCHEDULER_MAX_RUNNING_MINUTES:-10}
      QUEUE_SCHEDULER_MAX_AGE_DAYS_DONE: ${QUEUE_SCHEDULER_MAX_AGE_DAYS_DONE:-7}
      QUEUE_SCHEDULER_MAX_AGE_DAYS_FAILED: ${QUEUE_SCHEDULER_MAX_AGE_DAYS_FAILED:-30}

      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_PRETTY: ${LOG_PRETTY:-false}
    volumes:
      - dgii_ecf_engine_data:/data
      - dgii_ecf_engine_logs:/logs
    deploy:
      replicas: 1
      update_config:
        order: stop-first
        failure_action: rollback
      rollback_config:
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s

  dgii-ecf-worker-send:
    image: ${DGII_ECF_ENGINE_IMAGE}:${DGII_ECF_ENGINE_TAG}
    command:
      [
        "node",
        "dist/workers/runQueueWorker.js",
        "--queue=send-normal",
        "--mode=loop",
        "--max=${WORKER_SEND_MAX:-5}",
        "--sleepMs=${WORKER_SEND_SLEEP_MS:-3000}"
      ]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      APP_VERSION: ${APP_VERSION:-1.0.28}
      PORT: "4001"
      TRUST_PROXY: ${TRUST_PROXY:-1}

      DATABASE_ENABLED: ${DATABASE_ENABLED:-true}
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER requerido}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requerido}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB requerido}?schema=public
      DATABASE_LOG_QUERIES: ${DATABASE_LOG_QUERIES:-false}
      RUN_PRISMA_MIGRATE_ON_BOOT: "false"

      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:?REDIS_PASSWORD requerido}@redis:6379}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-dgii-ecf-engine-prod}
      REDIS_CONNECT_TIMEOUT_MS: ${REDIS_CONNECT_TIMEOUT_MS:-5000}
      REDIS_COMMAND_TIMEOUT_MS: ${REDIS_COMMAND_TIMEOUT_MS:-3000}
      RATE_LIMIT_REDIS_FAIL_OPEN: ${RATE_LIMIT_REDIS_FAIL_OPEN:-true}

      APP_DATA_DIR: ${APP_DATA_DIR:-/data}
      APP_LOG_DIR: ${APP_LOG_DIR:-/logs}
      TRANSACTIONS_DIR: ${TRANSACTIONS_DIR:-/data/transactions}
      CERT_STORE_DIR: ${CERT_STORE_DIR:-/data/certificates}
      REGISTRY_FILE: ${REGISTRY_FILE:-/data/registry.json}
      API_KEYS_FILE: ${API_KEYS_FILE:-/data/api_keys.json}
      USERS_FILE: ${USERS_FILE:-/data/users.json}
      AUDIT_LOG_FILE: ${AUDIT_LOG_FILE:-/logs/audit.log}

      CERT_MASTER_KEY_BASE64: ${CERT_MASTER_KEY_BASE64:?CERT_MASTER_KEY_BASE64 requerido}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?INTERNAL_API_TOKEN requerido}
      API_KEY_PEPPER: ${API_KEY_PEPPER:?API_KEY_PEPPER requerido}
      APP_JWT_SECRET: ${APP_JWT_SECRET:?APP_JWT_SECRET requerido}

      XML_XSD_VALIDATION_ENABLED: ${XML_XSD_VALIDATION_ENABLED:-true}
      XML_VALIDATOR_PYTHON: ${XML_VALIDATOR_PYTHON:-python3}

      QUEUE_SCHEDULER_ENABLED: "false"
      WORKER_QUEUE: SEND_NORMAL
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-1}

      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_PRETTY: ${LOG_PRETTY:-false}
    volumes:
      - dgii_ecf_engine_data:/data
      - dgii_ecf_engine_logs:/logs
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 60s
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s

  dgii-ecf-worker-send-high:
    image: ${DGII_ECF_ENGINE_IMAGE}:${DGII_ECF_ENGINE_TAG}
    command:
      [
        "node",
        "dist/workers/runQueueWorker.js",
        "--queue=send-high",
        "--mode=loop",
        "--max=${WORKER_SEND_HIGH_MAX:-10}",
        "--sleepMs=${WORKER_SEND_HIGH_SLEEP_MS:-1000}"
      ]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      APP_VERSION: ${APP_VERSION:-1.0.28}
      PORT: "4002"
      TRUST_PROXY: ${TRUST_PROXY:-1}

      DATABASE_ENABLED: ${DATABASE_ENABLED:-true}
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER requerido}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requerido}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB requerido}?schema=public
      DATABASE_LOG_QUERIES: ${DATABASE_LOG_QUERIES:-false}
      RUN_PRISMA_MIGRATE_ON_BOOT: "false"

      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:?REDIS_PASSWORD requerido}@redis:6379}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-dgii-ecf-engine-prod}
      REDIS_CONNECT_TIMEOUT_MS: ${REDIS_CONNECT_TIMEOUT_MS:-5000}
      REDIS_COMMAND_TIMEOUT_MS: ${REDIS_COMMAND_TIMEOUT_MS:-3000}
      RATE_LIMIT_REDIS_FAIL_OPEN: ${RATE_LIMIT_REDIS_FAIL_OPEN:-true}

      APP_DATA_DIR: ${APP_DATA_DIR:-/data}
      APP_LOG_DIR: ${APP_LOG_DIR:-/logs}
      TRANSACTIONS_DIR: ${TRANSACTIONS_DIR:-/data/transactions}
      CERT_STORE_DIR: ${CERT_STORE_DIR:-/data/certificates}
      REGISTRY_FILE: ${REGISTRY_FILE:-/data/registry.json}
      API_KEYS_FILE: ${API_KEYS_FILE:-/data/api_keys.json}
      USERS_FILE: ${USERS_FILE:-/data/users.json}
      AUDIT_LOG_FILE: ${AUDIT_LOG_FILE:-/logs/audit.log}

      CERT_MASTER_KEY_BASE64: ${CERT_MASTER_KEY_BASE64:?CERT_MASTER_KEY_BASE64 requerido}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?INTERNAL_API_TOKEN requerido}
      API_KEY_PEPPER: ${API_KEY_PEPPER:?API_KEY_PEPPER requerido}
      APP_JWT_SECRET: ${APP_JWT_SECRET:?APP_JWT_SECRET requerido}

      XML_XSD_VALIDATION_ENABLED: ${XML_XSD_VALIDATION_ENABLED:-true}
      XML_VALIDATOR_PYTHON: ${XML_VALIDATOR_PYTHON:-python3}

      QUEUE_SCHEDULER_ENABLED: "false"
      WORKER_QUEUE: SEND_HIGH_PRIORITY
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-1}

      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_PRETTY: ${LOG_PRETTY:-false}
    volumes:
      - dgii_ecf_engine_data:/data
      - dgii_ecf_engine_logs:/logs
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 60s
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s

  dgii-ecf-worker-send-bulk:
