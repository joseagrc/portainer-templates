    command:
      [
        "npx",
        "prisma",
        "migrate",
        "deploy"
      ]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_ENABLED: ${DATABASE_ENABLED:-true}
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER requerido}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requerido}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB requerido}?schema=public
      RUN_PRISMA_MIGRATE_ON_BOOT: "false"

      CERT_MASTER_KEY_BASE64: ${CERT_MASTER_KEY_BASE64:?CERT_MASTER_KEY_BASE64 requerido}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?INTERNAL_API_TOKEN requerido}
      API_KEY_PEPPER: ${API_KEY_PEPPER:?API_KEY_PEPPER requerido}
      APP_JWT_SECRET: ${APP_JWT_SECRET:?APP_JWT_SECRET requerido}
    volumes:
      - dgii_ecf_engine_data:/data
      - dgii_ecf_engine_logs:/logs
    deploy:
      replicas: 0
      restart_policy:
        condition: none

  dgii-ecf-portal:
    image: ${DGII_ECF_PORTAL_IMAGE}:${DGII_ECF_PORTAL_TAG}
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      CHROMIUM_PATH: /usr/bin/chromium

      NEXT_PUBLIC_API_BASE_URL: https://${ENGINE_DOMAIN}
      API_BASE_URL: https://${ENGINE_DOMAIN}
    tmpfs:
      - /tmp:size=512m,nosuid
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:3000/api/health || exit 1"
        ]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 60s
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s
      labels:
        - traefik.enable=true
        - traefik.docker.network=${NETWORK:-proxy}
        - traefik.http.routers.dgii-ecf-portal.rule=Host(`${PORTAL_DOMAIN}`)
        - traefik.http.routers.dgii-ecf-portal.entrypoints=websecure
        - traefik.http.routers.dgii-ecf-portal.tls=true
        - traefik.http.routers.dgii-ecf-portal.tls.certresolver=letsencrypt
        - traefik.http.services.dgii-ecf-portal.loadbalancer.server.port=3000
        - traefik.http.middlewares.dgii-ecf-portal-headers.headers.customresponseheaders.X-Content-Type-Options=nosniff
        - traefik.http.middlewares.dgii-ecf-portal-headers.headers.customresponseheaders.Referrer-Policy=strict-origin-when-cross-origin
        - traefik.http.routers.dgii-ecf-portal.middlewares=dgii-ecf-portal-headers

volumes:
  pgadmin_data:
  redis_data:
  redisinsight_data:
  dgii_ecf_postgres_data:
  dgii_ecf_engine_data:
  dgii_ecf_engine_logs:

networks:
  default:
    name: ${NETWORK:-proxy}
    external: true