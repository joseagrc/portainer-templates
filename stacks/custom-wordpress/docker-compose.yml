services:
  mariadb:
    container_name: ${COMPOSE_PROJECT_NAME}-mariadb
    stop_grace_period: 3m
    image: ${MARIADB_IMAGE}:${MARIADB_TAG}
    restart: always
    volumes:
      - mariadb-data:/var/lib/mysql
      - mariadb-logs:/logs
    environment:
      TIMEZONE: ${TIMEZONE}
      ROOT_PASS: ${MARIADB_ROOT_PASSWORD}
      DB_NAME: ${MARIADB_DATABASE}
      DB_USER: ${MARIADB_USER}
      DB_PASS: ${MARIADB_PASSWORD}

  phpmyadmin:
    container_name: ${COMPOSE_PROJECT_NAME}-phpmyadmin
    image: ${PHPMYADMIN_IMAGE}:${PHPMYADMIN_TAG}
    restart: unless-stopped
    depends_on:
      - mariadb
    environment:
      PMA_HOST: ${COMPOSE_PROJECT_NAME}-mariadb
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${NETWORK}"

      # Router principal: sirve www.domain.com
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-phpmyadmin.rule=Host(`www.${PHPMYADMIN_DOMAIN}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-phpmyadmin.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-phpmyadmin.tls=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-phpmyadmin.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-phpmyadmin.service=${COMPOSE_PROJECT_NAME}-phpmyadmin"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-phpmyadmin.middlewares=security@file,hsts@file,compression_https@file,rate-limit-strict@file"

      # Router de redirect: domain.com → www.domain.com
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-phpmyadmin-redirect.rule=Host(`${PHPMYADMIN_DOMAIN}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-phpmyadmin-redirect.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-phpmyadmin-redirect.tls=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-phpmyadmin-redirect.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-phpmyadmin-redirect.middlewares=www-redirect@file"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-phpmyadmin-redirect.service=${COMPOSE_PROJECT_NAME}-phpmyadmin"

      - "traefik.http.services.${COMPOSE_PROJECT_NAME}-phpmyadmin.loadbalancer.server.port=80"

  wordpress:
    container_name: ${COMPOSE_PROJECT_NAME}-app
    hostname: ${COMPOSE_PROJECT_NAME}-app
    image: ${WORDPRESS_IMAGE}:${WORDPRESS_TAG}
    restart: unless-stopped
    depends_on:
      - mariadb
    volumes:
      - wordpress-data:/www/wordpress
      - wordpress-logs:/www/logs
    environment:
      DB_HOST: ${COMPOSE_PROJECT_NAME}-mariadb
      DB_USER: ${MARIADB_USER}
      DB_PASS: ${MARIADB_PASSWORD}
      DB_NAME: ${MARIADB_DATABASE}
      DB_PREFIX: ${WORDPRESS_TABLE_PREFIX}
      ENABLE_HTTPS_REVERSE_PROXY: ${ENABLE_HTTPS_REVERSE_PROXY}
      WORDPRESS_VERSION: ${WORDPRESS_VERSION}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASS: ${ADMIN_PASS}
      SITE_LOCALE: ${SITE_LOCALE}
      SITE_TITLE: ${SITE_TITLE}
      SITE_URL: ${SITE_URL}
      UPDATE_MODE: ${UPDATE_MODE}
      CONTAINER_ENABLE_MONITORING: ${CONTAINER_ENABLE_MONITORING}
      ZABBIX_SERVER_HOST: ${ZABBIX_SERVER_HOST}
      ENABLE_REDIS: ${ENABLE_REDIS}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DATABASE: ${REDIS_DATABASE}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_MAXTTL: ${REDIS_MAXTTL}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${NETWORK}"

      # Router principal: acepta domain.com y www.domain.com
      # WordPress redirige al canónico según WP_HOME (definido por SITE_URL)
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-app.rule=Host(`${SITE_URL}`) || Host(`www.${SITE_URL}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-app.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-app.tls=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-app.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-app.service=${COMPOSE_PROJECT_NAME}-app"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-app.middlewares=security@file,hsts@file,compression_https@file"

      - "traefik.http.services.${COMPOSE_PROJECT_NAME}-app.loadbalancer.server.port=80"

volumes:
  mariadb-data:
  mariadb-logs:
  wordpress-data:
  wordpress-logs:

networks:
  default:
    name: ${NETWORK}
    external: true
